<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Calculadora de Investimentos</title>
  </head>
  <body
    class="h-auto md:h-[100dvh] min-h-[100dvh] flex flex-col md:grid md:grid-cols-3 md:grid-rows-2"
  >
    <aside
      class="md:row-span-2 bg-emerald-400 flex flex-col justify-between py-5 px-2 w-full"
    >
      <h1 class="text-2xl font-bold px-4 md:px-6 py-2 text-center">
        Calculadora de Investimentos
      </h1>
      <form class="w-full" id="investment-form">
        <div
          class="flex w-full flex-col px-4 md:px-6 my-2 h-auto md:h-[4.25rem]"
        >
          <label for="starting-amount" class="font-bold text-gray-700"
            >Investimento Inicial</label
          >
          <div class="flex">
            <input
              value="R$"
              class="w-2/12 md:w-1/6 bg-emerald-200 text-center rounded-l-lg py-1 md:py-0"
              type="text"
              disabled
            />
            <input
              type="text"
              class="w-10/12 md:w-5/6 bg-white rounded-r-lg px-2 py-1 md:py-0"
              placeholder="0.00"
              id="starting-amount"
              required
              name="starting-amount"
            />
          </div>
        </div>

        <div
          class="flex w-full flex-col px-4 md:px-6 my-2 h-auto md:h-[4.25rem]"
        >
          <label for="additional-contribution" class="font-bold text-gray-700"
            >Aportes adicionais</label
          >
          <div class="flex">
            <input
              value="R$"
              class="w-2/12 md:w-1/6 bg-emerald-200 text-center rounded-l-lg py-1 md:py-0"
              type="text"
              disabled
            />
            <input
              type="text"
              class="w-10/12 md:w-5/6 bg-white rounded-r-lg px-2 py-1 md:py-0"
              placeholder="0.00"
              id="additional-contribution"
              name="additional-contribution"
            />
          </div>
        </div>

        <div
          class="flex w-full flex-col px-4 md:px-6 my-2 h-auto md:h-[4.25rem]"
        >
          <label for="time-amount" class="font-bold text-gray-700">Prazo</label>
          <div class="flex">
            <input
              type="text"
              class="w-2/3 bg-white rounded-l-lg px-2 py-1 md:py-0"
              id="time-amount"
              required
              name="time-amount"
            />
            <select
              id="time-amount-period"
              class="w-1/3 bg-white rounded-r-lg text-center border-l-2 border-emerald-600 hover:bg-emerald-900 hover:text-slate-200 py-1 md:py-0"
            >
              <option value="monthly">Mensal</option>
              <option value="anualy">Anual</option>
            </select>
          </div>
        </div>

        <div
          class="flex w-full flex-col px-4 md:px-6 my-2 h-auto md:h-[4.25rem]"
        >
          <label for="return-rate" class="font-bold text-gray-700"
            >Rentabilidade</label
          >
          <div class="flex">
            <input
              value="%"
              class="w-2/12 md:w-1/6 bg-emerald-200 text-center rounded-l-lg py-1 md:py-0"
              type="text"
              disabled
            />
            <input
              type="text"
              class="w-6/12 md:w-1/2 bg-white px-2 py-1 md:py-0"
              id="return-rate"
              required
              name="return-rate"
            />
            <select
              id="evaluation-period"
              class="w-4/12 md:w-1/3 bg-white rounded-r-lg text-center border-l-2 border-emerald-600 hover:bg-emerald-900 hover:text-slate-200 py-1 md:py-0"
            >
              <option value="monthly">Mensal</option>
              <option value="anualy">Anual</option>
            </select>
          </div>
        </div>

        <div
          class="flex w-full flex-col px-4 md:px-6 my-2 h-auto md:h-[4.25rem]"
        >
          <label for="tax-rate" class="font-bold text-gray-700"
            >Impostos sobre lucro</label
          >
          <div class="flex">
            <input
              value="%"
              class="w-2/12 md:w-1/6 bg-emerald-200 text-center rounded-l-lg py-1 md:py-0"
              type="text"
              disabled
            />
            <input
              type="text"
              class="w-10/12 md:w-5/6 bg-white rounded-r-lg px-2 py-1 md:py-0"
              id="tax-rate"
              required
              name="tax-rate"
            />
          </div>
        </div>
      </form>
      <div
        class="flex flex-col md:flex-row h-auto md:h-12 px-4 md:px-6 my-4 md:my-8 w-full gap-2 md:gap-2"
        class="flex h-12 px-4 md:px-6 my-4 md:my-8 w-full gap-2"
      >
        <button
          id="calculate-results"
          form="investment-form"
          class="w-full md:w-1/2 h-12 md:h-full rounded-lg bg-emerald-950 text-slate-200 hover:bg-emerald-800 cursor-pointer border border-emerald-900"
          class="w-1/2 h-full rounded-lg bg-emerald-950 text-slate-200 hover:bg-emerald-800 cursor-pointer border border-emerald-900"
        >
          Calcular
        </button>
        <button
          id="clear-form"
          class="w-full md:w-1/2 h-12 md:h-full rounded-lg hover:bg-emerald-500 cursor-pointer border border-emerald-900"
          class="w-1/2 h-full rounded-lg hover:bg-emerald-500 cursor-pointer border border-emerald-900"
        >
          Limpar
        </button>
      </div>
    </aside>
    <main
      class="md:row-span-2 md:col-span-2 relative min-h-[600px] md:min-h-0 flex-1"
    >
      <button
        id="slide-arrow-previous"
        class="absolute top-0 bottom-0 left-0 text-3xl md:text-5xl cursor-pointer bg-slate-200 opacity-50 w-8 md:w-10 hover:opacity-100 focus:opacity-100 z-10"
      >
        &#8249;
      </button>
      <button
        id="slide-arrow-next"
        class="absolute top-0 bottom-0 right-0 text-3xl md:text-5xl cursor-pointer bg-slate-200 opacity-50 w-8 md:w-10 hover:opacity-100 focus:opacity-100 z-10"
      >
        &#8250;
      </button>
      <div
        id="carousel"
        class="h-full w-full flex overflow-x-auto scroll-smooth snap-x snap-mandatory"
      >
        <section
          id="charts-container"
          class="h-full w-full basis-full shrink-0 snap-center p-2 md:p-4 flex flex-col"
        >
          <div
            class="h-1/2 md:h-[36%] w-full flex flex-col items-center pb-4 md:pb-10"
          >
            <p class="font-bold text-base md:text-lg">Resultado Final</p>
            <canvas id="final-money-distribution"></canvas>
          </div>
          <div class="h-1/2 md:h-[56%] w-full flex flex-col items-center">
            <p class="font-bold text-base md:text-lg">Progressão</p>
            <canvas id="progression"></canvas>
          </div>
        </section>
        <section
          id="table-container"
          class="h-full w-full overflow-auto basis-full shrink-0 snap-center p-2 md:p-4"
        >
          <p class="font-bold text-lg text-center">Resultados mensais</p>
          <table
            class="w-full max-h-full border border-separate text-xs sm:text-sm md:text-base"
            id="results-table"
          ></table>
        </section>
      </div>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
