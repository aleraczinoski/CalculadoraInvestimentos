<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Calculadora de Investimentos</title>
  </head>
  <body class="h-[100dvh] grid grid-cols-3 grid-rows-2">
    <aside
      class="row-span-2 bg-emerald-400 flex flex-col justify-between py-5 px-2"
    >
      <h1 class="text-2xl font-bold px-6 py-2 text-center">
        Calculadora de Investimentos
      </h1>
      <form class="w-full">
        <div class="flex w-full flex-col px-6 my-2">
          <label for="starting-amount" class="font-bold text-gray-700"
            >Investimento Inicial</label
          >
          <div class="flex">
            <input
              value="R$"
              class="w-1/6 bg-emerald-200 text-center rounded-l-lg"
              type="text"
              disabled
            />
            <input
              type="text"
              class="w-5/6 bg-white rounded-r-lg px-1"
              placeholder="0.00"
              id="starting-amount"
            />
          </div>
        </div>

        <div class="flex w-full flex-col px-6 my-2">
          <label for="additional-contribution" class="font-bold text-gray-700"
            >Aportes adicionais</label
          >
          <div class="flex">
            <input
              value="R$"
              class="w-1/6 bg-emerald-200 text-center rounded-l-lg"
              type="text"
              disabled
            />
            <input
              type="text"
              class="w-5/6 bg-white rounded-r-lg px-1"
              placeholder="0.00"
              id="additional-contribution"
            />
          </div>
        </div>

        <div class="flex w-full flex-col px-6 my-2">
          <label for="time-amount" class="font-bold text-gray-700">Prazo</label>
          <div class="flex">
            <input
              type="text"
              class="w-2/3 bg-white rounded-l-lg px-1"
              id="time-amount"
            />
            <select
              id="time-amount-period"
              class="w-1/3 bg-white rounded-r-lg text-center border-l-2 border-emerald-600 hover:bg-emerald-900 hover:text-slate-200"
            >
              <option value="monthly">Mensal</option>
              <option value="anualy">Anual</option>
            </select>
          </div>
        </div>

        <div class="flex w-full flex-col px-6 my-2">
          <label for="return-rate" class="font-bold text-gray-700"
            >Rentabilidade</label
          >
          <div class="flex">
            <input
              value="%"
              class="w-1/6 bg-emerald-200 text-center rounded-l-lg"
              type="text"
              disabled
            />
            <input type="text" class="w-1/2 bg-white px-1" id="return-rate" />
            <select
              id="evaluation-period"
              class="w-1/3 bg-white rounded-r-lg text-center border-l-2 border-emerald-600 hover:bg-emerald-900 hover:text-slate-200"
            >
              <option value="monthly">Mensal</option>
              <option value="anualy">Anual</option>
            </select>
          </div>
        </div>

        <div class="flex w-full flex-col px-6 my-2">
          <label for="tax-rate" class="font-bold text-gray-700"
            >Impostos sobre lucro</label
          >
          <div class="flex">
            <input
              value="%"
              class="w-1/6 bg-emerald-200 text-center rounded-l-lg"
              type="text"
              disabled
            />
            <input
              type="text"
              class="w-5/6 bg-white rounded-r-lg px-1"
              id="tax-rate"
            />
          </div>
        </div>
      </form>
      <div class="flex h-12 px-6 my-8 w-full gap-2">
        <button
          class="w-1/2 rounded-lg bg-emerald-950 text-slate-200 hover:bg-emerald-800 cursor-pointer border border-emerald-900"
        >
          Calcular
        </button>
        <button
          class="w-1/2 rounded-lg hover:bg-emerald-500 cursor-pointer border border-emerald-900"
        >
          Limpar
        </button>
      </div>
    </aside>
    <main>
      <p>Resultados</p>
    </main>
  </body>
</html>
